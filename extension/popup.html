<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>PechPech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <span class="brand-name">PechPech</span>
    </div>
    <a href="settings.html" target="_blank" class="settings-btn" title="تنظیمات">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </header>

  <!-- ── Idle ── -->
  <div id="state-idle" class="state">
    <div class="hero">
      <button id="btn-start" class="record-btn" aria-label="شروع ضبط">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <span class="hero-label">شروع ضبط جلسه</span>
    </div>

    <div class="list-section">
      <div class="list-header">
        <span class="list-title">ضبط‌های اخیر</span>
        <button id="btn-refresh" class="ghost-icon-btn" title="بازخوانی">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
      <div id="recordings-list" class="recordings-list">
        <div class="rec-empty">در حال بارگذاری…</div>
      </div>
    </div>
  </div>

  <!-- ── Recording ── -->
  <div id="state-recording" class="state hidden">
    <div class="recording-hero">
      <div class="ripple-wrap">
        <div class="ripple r1"></div>
        <div class="ripple r2"></div>
        <div class="ripple r3"></div>
        <div class="rec-core"></div>
      </div>
      <div class="rec-info">
        <span class="rec-live">● REC</span>
        <span id="elapsed-time" class="rec-timer">۰۰:۰۰</span>
      </div>
    </div>
    <button id="btn-stop" class="stop-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
      توقف و ذخیره
    </button>
  </div>

  <!-- ── Processing / Uploading ── -->
  <div id="state-processing" class="state hidden">
    <div class="steps-wrap">
      <div id="step-transcribe" class="step-item">
        <div class="step-circle">🎤</div>
        <span class="step-label">رونویسی</span>
      </div>
      <div class="step-line"></div>
      <div id="step-summarize" class="step-item">
        <div class="step-circle">📝</div>
        <span class="step-label">تحلیل</span>
      </div>
    </div>
    <p id="processing-message" class="processing-msg">در حال پردازش…</p>
    <p class="processing-note">می‌توانید این پنجره را ببندید، پردازش ادامه می‌یابد.</p>
  </div>

  <!-- ── Result ── -->
  <div id="state-result" class="state hidden">
    <div class="mom-card">
      <div class="mom-block">
        <div class="mom-block-head"><span class="mom-icon">📋</span><span class="mom-label">خلاصه</span></div>
        <p id="result-summary" class="mom-text"></p>
      </div>
      <div class="mom-divider"></div>
      <div class="mom-block">
        <div class="mom-block-head"><span class="mom-icon">✅</span><span class="mom-label">تصمیمات</span></div>
        <p id="result-decisions" class="mom-text"></p>
      </div>
      <div class="mom-divider"></div>
      <div class="mom-block">
        <div class="mom-block-head"><span class="mom-icon">📌</span><span class="mom-label">اقدامات</span></div>
        <p id="result-actions" class="mom-text"></p>
      </div>
    </div>
    <div id="transcript-section" class="transcript-section">
      <!-- state: request (no corrected transcript yet) -->
      <div id="transcript-request">
        <button id="btn-correct" class="transcript-toggle transcript-request-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>اصلاح و تفکیک گوینده‌ها</span>
        </button>
      </div>
      <!-- state: correcting (loading) -->
      <div id="transcript-loading" class="hidden">
        <div class="transcript-toggle transcript-loading-row">
          <svg class="spin" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <span>در حال اصلاح متن…</span>
        </div>
      </div>
      <!-- state: done (collapsible) -->
      <div id="transcript-done" class="hidden">
        <button id="btn-transcript-toggle" class="transcript-toggle">
          <span>متن اصلاح‌شده</span>
          <svg id="transcript-chevron" class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="result-transcript" class="transcript-body hidden"></div>
      </div>
    </div>

    <div class="result-bar">
      <button id="btn-save" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        ذخیره .md
      </button>
      <button id="btn-new" class="btn btn-ghost">← بازگشت</button>
    </div>
  </div>

  <!-- ── Error ── -->
  <div id="state-error" class="state hidden">
    <div class="error-card">
      <span class="error-emoji">⚠️</span>
      <p id="error-message" class="error-text"></p>
    </div>
    <button id="btn-retry" class="btn btn-ghost">← بازگشت</button>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
